<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquimetro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>Parquimetro</header>

<div>    
    
    <table>
        <caption>Tabela de preços</caption>
        <thead>
            <tr>
                <th>Plano 1</th>
                <th>Plano 2</th>
                <th>Plano 3</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>30 Minutos</td>
                <td>60 Minutos</td>
                <td>120 Minutos</td>
            </tr>

            <tbody>
            <tr>
                <td>R$ 1,00</td>
                <td>R$ 1,75</td>
                <td>R$ 3,00</td>
            </tr>
        </tbody>
    </table>

</div>

<section>
    <h2>Escolha o tempo</h2>
    <select id="tempo">
    
        <option value="1.00">30 Minutos</option>
        <option value="1.75">60 Minutos</option>
        <option value="3.00">120 Minutos</option>
 
    </select>
    <h3>Valor a pagar: <input type="number" id="dinheiro"></h3>
    <button onclick = "pagar()" >Pagar</button>
    <p id="resultado"></p>

    <script src="scripts.js"></script>
</section>
</body>
</html>
